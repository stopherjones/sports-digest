<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Global Sports Digest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>🏆 Global Sports Digest</h1>
      <p id="week-ending"><small>Loading latest update...</small></p>
    </header>

    <!-- Highlights Section -->
    <section>
      <h2>✨ This Week's Highlights</h2>
      <div class="highlight-box">
        <p><strong>Last Week:</strong> <span id="last-week-highlight">Loading...</span></p>
        <p style="margin-bottom: 0;"><strong>This Week:</strong> <span id="this-week-highlight">Loading...</span></p>
      </div>
    </section>

    <!-- Sport Cards Section -->
    <section>
      <h2>🏅 Sport Focus</h2>
      <div id="cards-container" class="cards-grid"></div>
    </section>
  </main>

  <script>
    fetch('./data/latest.json')
      .then(res => res.json())
      .then(data => {
        document.getElementById('week-ending').innerText = `Week Ending: ${data.week_ending}`;
        document.getElementById('last-week-highlight').innerText = data.highlights.last_week;
        document.getElementById('this-week-highlight').innerText = data.highlights.this_week;

        const cardsHTML = data.sports_cards.map(card => `
          <article class="sport-card">
            <header>
              <h3 style="margin: 0;">${card.icon} ${card.sport}</h3>
              <small><strong>${card.event}</strong> — ${card.status}</small>
            </header>
            <p>${card.details}</p>
            <div class="previous-winner">
              🏆 <strong>Previous Winner:</strong> ${card.previous_winner}
            </div>
          </article>
        `).join('');

        document.getElementById('cards-container').innerHTML = cardsHTML;
      })
      .catch(err => {
        document.getElementById('week-ending').innerText = 'Failed to load data.';
        console.error(err);
      });
  </script>
</body>
</html>
