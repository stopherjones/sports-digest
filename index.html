<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Sports Digest</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="main-header">
    <div class="header-top">
      <div class="header-title">
        <h1>🏆 Global Sports Digest</h1>
        <p id="generated-at"><small>Loading latest update...</small></p>
      </div>
    </div>

    <!-- Toolbar Controls -->
    <div class="controls-toolbar" aria-label="Digest filters">
      <div class="search-box">
        <input type="text" id="digest-search" placeholder="Search events or sports...">
      </div>
      <div class="filter-box">
        <select id="sport-filter">
          <option value="all">All Sports</option>
        </select>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- Section 1: Just Finished (Last 7 Days) -->
    <section id="section-just-finished" class="digest-section" style="display: none;">
      <h2 class="section-title">🏁 Just Finished</h2>
      <div id="just-finished-container" class="cards-grid"></div>
    </section>

    <!-- Section 2: Coming Up (Next 7 Days) -->
    <section id="section-coming-up" class="digest-section" style="display: none;">
      <h2 class="section-title">⏳ Coming Up</h2>
      <div id="coming-up-container" class="cards-grid"></div>
    </section>

    <!-- Section 3: Ongoing Events -->
    <section id="section-ongoing" class="digest-section" style="display: none;">
      <h2 class="section-title">🔄 Ongoing Events</h2>
      <div id="ongoing-container" class="cards-grid"></div>
    </section>

    <!-- Section 4: Upcoming & Future Events -->
    <section id="section-future" class="digest-section" style="display: none;">
      <h2 class="section-title">📅 Upcoming & Future Events</h2>
      <div id="future-container" class="cards-grid"></div>
    </section>

  </main>

  <footer class="main-footer">
    <p>&copy; 2026 Global Sports Digest &bull; Automated Sports Tracking</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
